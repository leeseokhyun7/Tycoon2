<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#b8e6f7">
<title>붕어빵 타이쿤</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
<style>
:root{
  --sky1:#aee2f7; --sky2:#e2f5fc;
  --cream:#fff6e8; --cream2:#ffe9c9;
  --wood:#e8a95e; --wood-d:#c9853e; --wood-dd:#a5641f;
  --iron:#3b4258; --iron-d:#262b3c;
  --gold:#f5a83c; --pinkred:#f66d5c; --candy:#ff9046;
  --ink:#5a3a22; --ink-l:#8a6038;
  --ok:#6dc46b; --bad:#f66d5c;
  --outline:#4a342c;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;touch-action:manipulation;user-select:none;-webkit-user-select:none}
html,body{height:100%;overflow:hidden}
body{
  background:#7ec3e0;
  font-family:'Jua','Apple SD Gothic Neo','Malgun Gothic','Noto Sans KR',sans-serif;
  display:flex;justify-content:center;align-items:stretch;
}
#app{
  position:relative;width:100%;max-width:480px;height:100dvh;
  background:linear-gradient(180deg,var(--sky1) 0%,var(--sky2) 46%,#fdf3e0 60%,#f7e6c8 100%);
  overflow:hidden;display:flex;flex-direction:column;
  box-shadow:0 0 60px rgba(30,80,110,.45);
}
#snow{position:absolute;inset:0;pointer-events:none;z-index:6}
.screen{position:absolute;inset:0;z-index:2;display:flex;flex-direction:column}
.hidden{display:none!important}

/* ---------- 공통 버튼 ---------- */
.btn{
  border:3px solid #fff;border-radius:20px;font-family:inherit;font-weight:400;cursor:pointer;
  background:linear-gradient(180deg,#ffbe5c,#ff9046);color:#fff;
  text-shadow:0 2px 0 rgba(160,80,10,.45);letter-spacing:1px;
  box-shadow:0 5px 0 #d96c28,0 8px 16px rgba(120,60,10,.3),inset 0 3px 0 rgba(255,255,255,.45);
  padding:13px 34px;font-size:21px;transition:transform .06s,box-shadow .06s;
}
.btn:active{transform:translateY(4px);box-shadow:0 1px 0 #d96c28}
.btn.secondary{background:linear-gradient(180deg,#8fd0f2,#57a8dd);box-shadow:0 5px 0 #3a7cb0,0 8px 16px rgba(30,80,120,.3)}
.btn.secondary:active{box-shadow:0 1px 0 #3a7cb0}
.btn:disabled{filter:grayscale(.8) brightness(.85);cursor:default}

/* ---------- 타이틀 화면 ---------- */
#titleScreen{align-items:center;justify-content:center;gap:8px;text-align:center;padding:24px;overflow:hidden}
#titleScreen .title-city{position:absolute;left:0;right:0;bottom:0;height:52%;pointer-events:none;opacity:.9}
.title-awning{position:absolute;top:0;left:0;right:0;height:58px;z-index:2;
  background:repeating-linear-gradient(90deg,var(--pinkred) 0 44px,#fff 44px 88px);
  border-bottom:5px solid rgba(160,60,40,.35);
  border-radius:0 0 24px 24px;box-shadow:0 8px 20px rgba(120,60,30,.25)}
#titleFish{width:190px;z-index:2;filter:drop-shadow(0 12px 16px rgba(120,60,10,.35));animation:bobble 2.6s ease-in-out infinite}
@keyframes bobble{0%,100%{transform:translateY(0) rotate(-3deg)}50%{transform:translateY(-12px) rotate(3deg)}}
.logo{z-index:2;line-height:1.02;transform:rotate(-2deg)}
.logo .l1{display:block;font-size:58px;color:#ff7a45;
  -webkit-text-stroke:2px #fff;
  text-shadow:0 3px 0 #fff,0 -3px 0 #fff,3px 0 0 #fff,-3px 0 0 #fff,0 8px 0 rgba(190,90,30,.85),0 14px 18px rgba(120,60,10,.35)}
.logo .l2{display:block;font-size:58px;color:#57a8dd;
  -webkit-text-stroke:2px #fff;
  text-shadow:0 3px 0 #fff,0 -3px 0 #fff,3px 0 0 #fff,-3px 0 0 #fff,0 8px 0 rgba(40,100,150,.85),0 14px 18px rgba(30,80,120,.35)}
.since{z-index:2;background:#fff;color:#c98a3e;font-size:13px;letter-spacing:3px;
  border-radius:99px;padding:4px 16px;box-shadow:0 3px 0 rgba(180,120,50,.35);margin:6px 0 10px}
#titleBtns{z-index:2;display:flex;flex-direction:column;gap:12px}
.title-teaser{z-index:2;font-size:10.5px;color:#b07a45;opacity:.8;margin-top:11px;letter-spacing:.2px;
  background:rgba(255,255,255,.5);border-radius:99px;padding:3px 12px;box-shadow:0 2px 0 rgba(200,150,90,.2)}
.title-teaser b{color:#e0864a}
.title-teaser .th{color:#f66d8a;display:inline-block;animation:teaseHeart 1.8s ease-in-out infinite}
@keyframes teaseHeart{0%,100%{transform:scale(1)}50%{transform:scale(1.35)}}
#titleCrowd{position:absolute;bottom:-6px;left:0;right:0;z-index:2;display:flex;justify-content:center;align-items:flex-end;gap:-10px;pointer-events:none}
#titleCrowd svg{width:88px;height:auto;margin:0 -10px;filter:drop-shadow(0 6px 8px rgba(120,60,10,.3))}
#titleCrowd svg:nth-child(2n){transform:translateY(14px) scale(.92)}
#titleCrowd svg:nth-child(3n){transform:translateY(6px)}

/* ---------- 인트로/튜토리얼 화면 ---------- */
#introScreen{align-items:center;justify-content:flex-start;overflow:hidden;
  background:linear-gradient(180deg,var(--sky1) 0%,var(--sky2) 42%,#fdf3e0 62%,#f7e6c8 100%)}
#introSkip{position:absolute;top:calc(env(safe-area-inset-top,0px) + 66px);right:14px;z-index:5;
  background:rgba(255,255,255,.85);border:2.5px solid #ffd9a0;color:#c98a3e;border-radius:99px;
  padding:6px 15px;font-size:14px;font-family:inherit;cursor:pointer;
  box-shadow:0 3px 0 rgba(200,140,60,.35)}
#introSkip:active{transform:translateY(2px);box-shadow:0 1px 0 rgba(200,140,60,.35)}
#introViewport{flex:1;width:100%;overflow:hidden;position:relative;z-index:2;
  margin-top:calc(env(safe-area-inset-top,0px) + 58px)}
#introTrack{display:flex;height:100%;transition:transform .42s cubic-bezier(.34,1.4,.64,1)}
.intro-slide{flex:0 0 100%;height:100%;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:6px;padding:14px 30px 6px;text-align:center}
.intro-slide.img{padding:0}
.intro-img{width:100%;height:100%;object-fit:contain}
.intro-stage{width:220px;height:186px;position:relative;display:flex;align-items:center;justify-content:center;
  margin-bottom:6px}
.intro-badge{background:#fff;color:#e07a2a;font-size:13px;letter-spacing:1px;border:2.5px solid #ffcf8a;
  border-radius:99px;padding:4px 16px;box-shadow:0 3px 0 rgba(200,140,60,.35)}
.intro-h{font-size:27px;line-height:1.18;color:#ff7a45;-webkit-text-stroke:1.5px #fff;
  text-shadow:0 2px 0 #fff,0 5px 0 rgba(190,90,30,.6),0 9px 12px rgba(120,60,10,.25);margin-top:2px}
.intro-slide.blue .intro-h{color:#57a8dd;text-shadow:0 2px 0 #fff,0 5px 0 rgba(40,100,150,.6),0 9px 12px rgba(30,80,120,.25)}
.intro-slide.green .intro-h{color:#4db06b;text-shadow:0 2px 0 #fff,0 5px 0 rgba(30,120,60,.55),0 9px 12px rgba(20,90,50,.22)}
.intro-p{font-size:15.5px;line-height:1.5;color:#7a5a38;max-width:340px;margin-top:8px;
  background:rgba(255,255,255,.6);border-radius:18px;padding:11px 16px;
  box-shadow:0 3px 0 rgba(220,170,110,.3)}
.intro-p b{color:#e07a2a}
#introDots{display:flex;gap:9px;justify-content:center;z-index:3;margin:2px 0 6px}
#introDots i{width:9px;height:9px;border-radius:50%;background:#e6d3b4;transition:all .3s}
#introDots i.on{background:var(--gold);width:24px;border-radius:6px}
#introNav{z-index:3;display:flex;gap:12px;padding:0 24px calc(env(safe-area-inset-bottom,0px) + 20px);width:100%;
  max-width:400px;justify-content:center}
#introNav .btn{flex:1}
/* 슬라이드 아트 애니메이션 */
.intro-fish-fry{width:150px;filter:drop-shadow(0 8px 10px rgba(120,60,10,.3))}
.intro-timer-ring{position:absolute;top:6px;right:14px;width:52px;height:52px}
.intro-timer-ring circle{fill:none;stroke-width:7;stroke-linecap:round}
.intro-timer-ring .bg{stroke:rgba(255,255,255,.7)}
.intro-timer-ring .fg{stroke:#f66d5c;stroke-dasharray:138;stroke-dashoffset:0;
  transform:rotate(-90deg);transform-origin:center;animation:introTimer 2.4s linear infinite}
@keyframes introTimer{from{stroke-dashoffset:0}to{stroke-dashoffset:138}}
.intro-hand{position:absolute;bottom:8px;left:50%;font-size:34px;animation:introTap 1.1s ease-in-out infinite}
@keyframes introTap{0%,100%{transform:translate(-50%,0)}45%{transform:translate(-50%,-16px) rotate(-8deg)}}
.intro-chart{display:flex;align-items:flex-end;gap:9px;height:150px;padding:0 4px}
.intro-chart i{width:26px;border-radius:6px 6px 0 0;background:linear-gradient(180deg,#ffd25c,#ff9046);
  box-shadow:0 3px 0 rgba(190,120,40,.35);transform-origin:bottom;animation:introGrow 2.6s ease-in-out infinite}
.intro-chart i:nth-child(1){animation-delay:0s}
.intro-chart i:nth-child(2){animation-delay:.25s}
.intro-chart i:nth-child(3){animation-delay:.5s}
.intro-chart i:nth-child(4){animation-delay:.75s}
.intro-chart i:nth-child(5){animation-delay:1s}
@keyframes introGrow{0%,100%{transform:scaleY(.45)}50%{transform:scaleY(1)}}
.intro-arrow{position:absolute;font-size:30px;right:6px;top:14px;color:#4db06b;
  animation:introBob 1.6s ease-in-out infinite}
@keyframes introBob{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.intro-combo{background:#fff;border:4px solid #ffb85c;color:#ff7a1e;border-radius:99px;
  padding:10px 26px;font-size:30px;box-shadow:0 6px 14px rgba(150,80,20,.3);
  animation:introComboPop 1.4s ease-in-out infinite}
@keyframes introComboPop{0%,100%{transform:scale(1) rotate(-3deg)}50%{transform:scale(1.14) rotate(3deg)}}
.intro-mini{position:absolute;width:44px;animation:introOrbit 3s ease-in-out infinite}
.intro-mini.m1{left:6px;top:24px;animation-delay:0s}
.intro-mini.m2{right:6px;top:12px;animation-delay:.6s}
.intro-mini.m3{left:20px;bottom:10px;animation-delay:1.2s}
@keyframes introOrbit{0%,100%{transform:translateY(0) rotate(-6deg)}50%{transform:translateY(-12px) rotate(6deg)}}

/* ---------- 상단 바 ---------- */
#topbar{
  z-index:5;display:flex;align-items:center;gap:7px;
  padding:calc(env(safe-area-inset-top,0px) + 8px) 10px 9px;
  background:repeating-linear-gradient(90deg,var(--pinkred) 0 40px,#fff 40px 80px);
  border-bottom:4px solid rgba(160,60,40,.3);box-shadow:0 4px 14px rgba(140,70,40,.25);
}
.chip{
  background:#fff;color:var(--ink);border:2.5px solid #ffd9a0;border-radius:99px;
  padding:5px 12px;font-size:15px;white-space:nowrap;
  display:flex;align-items:center;gap:5px;box-shadow:0 3px 0 rgba(200,140,60,.35),inset 0 2px 0 rgba(255,255,255,.9);
}
#moneyChip{flex:1;justify-content:center;font-size:17px;color:#b06a1a}
#moneyChip::before{content:"";width:15px;height:15px;border-radius:50%;flex:0 0 auto;
  background:radial-gradient(circle at 34% 30%,#ffe9a0,#f7c948 55%,#dd9a2a);
  border:2px solid #c9861e;box-shadow:inset 0 -2px 2px rgba(160,100,10,.4)}
#repChip{color:#e08a2a}
.icon-btn{
  background:#fff;border:2.5px solid #ffd9a0;color:#e08a2a;border-radius:14px;
  width:40px;height:36px;font-size:17px;cursor:pointer;font-family:inherit;
  box-shadow:0 3px 0 rgba(200,140,60,.35);
}
#dayBarWrap{height:10px;background:rgba(255,255,255,.6);z-index:5;border-bottom:2px solid rgba(220,170,110,.4)}
#dayBar{height:100%;width:0%;background:linear-gradient(90deg,#ffd25c,#ff9046,#f66d5c);transition:width .3s linear;border-radius:0 6px 6px 0}

/* ---------- 손님 거리 ---------- */
#street{
  z-index:2;position:relative;flex:0 0 auto;height:182px;display:flex;align-items:flex-end;
  justify-content:center;gap:6px;padding:0 8px 4px;
}
#street .city{position:absolute;left:0;right:0;bottom:22px;height:230px;pointer-events:none;z-index:0}
#street::before{content:"";position:absolute;left:0;right:0;bottom:0;height:28px;z-index:1;
  background:
    repeating-linear-gradient(90deg,transparent 0 34px,rgba(255,255,255,.85) 34px 58px,transparent 58px 92px) 0 12px/100% 10px no-repeat,
    linear-gradient(180deg,#efe4d2,#e3d2b8);
  border-top:3px solid #fff}
.customer{
  position:relative;width:112px;display:flex;flex-direction:column;align-items:center;
  transition:transform .35s cubic-bezier(.34,1.56,.64,1),opacity .3s;cursor:pointer;z-index:2;
}
.customer.enter{animation:walkIn .5s cubic-bezier(.34,1.4,.64,1)}
@keyframes walkIn{from{transform:translateX(150px);opacity:0}to{transform:translateX(0);opacity:1}}
.customer.leave{transform:translateX(-170px)!important;opacity:0}
.customer.happyPop svg.body,.customer.happyPop img.body{animation:hop .45s ease}
@keyframes hop{30%{transform:translateY(-14px)}60%{transform:translateY(0)}80%{transform:translateY(-6px)}}
.bubble{
  background:#fff;border:3px solid #ffcf8a;border-radius:18px;padding:7px 12px 6px;margin-bottom:6px;min-width:96px;
  box-shadow:0 5px 12px rgba(150,90,30,.3);position:relative;text-align:center;
}
.bubble::after{content:"";position:absolute;bottom:-9px;left:50%;transform:translateX(-50%);
  border:8px solid transparent;border-top-color:#ffcf8a;border-bottom:none}
.bubble .order-line{display:flex;align-items:center;justify-content:center;gap:4px;font-size:18px;color:var(--ink);line-height:1.1}
.bubble .order-line svg{width:38px;height:24px}
.bubble .order-line .nmlabel{font-size:14px;color:var(--ink)}
.bubble .order-line .cnt{font-size:22px;color:#e0562f;font-weight:400}
.bubble .say{font-size:15px;color:#6b8f3a;white-space:nowrap;padding:3px 4px 2px;line-height:1.1}
.bubble .say.bad{color:#e0562f}
.bubble .order-line .done-part{opacity:.3;text-decoration:line-through}
.patience{height:6px;border-radius:4px;background:#f0e4d0;margin-top:4px;overflow:hidden;border:1px solid #e5d2b5}
.patience i{display:block;height:100%;border-radius:4px;background:var(--ok);transition:width .3s linear}
.customer svg.body{width:88px;height:auto;filter:drop-shadow(0 5px 6px rgba(120,60,10,.3))}
.customer img.body{width:104px;height:auto;filter:drop-shadow(0 6px 7px rgba(120,60,10,.32))}
.cityimg{width:100%;height:100%;object-fit:cover;object-position:bottom}

/* ---------- 화덕(굽는 판) ---------- */
#grillWrap{
  z-index:2;flex:1 1 auto;display:flex;flex-direction:column;justify-content:center;padding:10px 12px 6px;min-height:0;
  background:
    linear-gradient(180deg,rgba(255,255,255,.25),transparent 20px),
    repeating-linear-gradient(90deg,var(--wood) 0 64px,#dd9c50 64px 66px);
  border-top:5px solid #fff;
  box-shadow:0 -4px 14px rgba(150,90,30,.2) inset;
}
#grill{
  background:linear-gradient(180deg,#4d5570,var(--iron) 32%,var(--iron-d));
  border-radius:24px;padding:12px;display:grid;gap:10px;
  grid-template-columns:repeat(3,1fr);
  box-shadow:inset 0 3px 8px rgba(255,255,255,.14),inset 0 -8px 14px rgba(0,0,0,.5),0 10px 22px rgba(90,50,10,.35);
  border:5px solid #fff;outline:3px solid rgba(160,100,40,.25);position:relative;
}
#grill::before{content:"";position:absolute;inset:8px;border-radius:16px;pointer-events:none;
  box-shadow:inset 0 0 44px rgba(255,140,50,.16)}
#grill::after{content:"";position:absolute;inset:0;border-radius:19px;pointer-events:none;
  background:linear-gradient(115deg,rgba(255,255,255,.10) 0%,rgba(255,255,255,0) 30%)}
.mold{
  position:relative;border-radius:15px;aspect-ratio:1.55/1;cursor:pointer;
  background:radial-gradient(130% 130% at 50% 28%,#333a4e,#20242f);
  box-shadow:inset 0 5px 10px rgba(0,0,0,.65),inset 0 -2px 4px rgba(255,255,255,.07);
  display:flex;align-items:center;justify-content:center;
}
.mold svg.fish{width:90%;height:auto;overflow:visible}
.mold .fish-wrap{position:relative;width:100%;height:100%;display:flex;align-items:center;justify-content:center;transition:transform .28s}
.fimg{position:absolute;left:3%;top:5%;width:94%;height:90%;object-fit:contain;transition:opacity .2s}
.mold.flipping .fish-wrap{animation:flipAnim .32s ease}
@keyframes flipAnim{50%{transform:scaleY(.15) translateY(-6px)}}
.mold .ring{position:absolute;inset:4px;border-radius:12px;pointer-events:none;opacity:0;transition:opacity .2s}
.mold.attn .ring{opacity:1;animation:ringPulse .8s ease-in-out infinite}
@keyframes ringPulse{0%,100%{box-shadow:0 0 0 3px rgba(255,220,120,.95),0 0 20px rgba(255,180,60,.65)}50%{box-shadow:0 0 0 3px rgba(255,220,120,.25),0 0 6px rgba(255,180,60,.2)}}
.mold.burnt-attn .ring{opacity:1;animation:ringBad .7s ease-in-out infinite}
@keyframes ringBad{0%,100%{box-shadow:0 0 0 3px rgba(246,109,92,.95)}50%{box-shadow:0 0 0 3px rgba(246,109,92,.25)}}
.mold .tag{
  position:absolute;top:-11px;left:50%;transform:translateX(-50%);z-index:3;
  background:#fff;color:#e07a2a;font-size:12px;border:2px solid #ffcf8a;border-radius:99px;padding:2px 9px;
  box-shadow:0 3px 6px rgba(120,60,10,.3);white-space:nowrap;opacity:0;transition:opacity .2s;
  animation:tagBounce .7s ease-in-out infinite;
}
@keyframes tagBounce{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(-4px)}}
.mold.attn .tag,.mold.burnt-attn .tag{opacity:1}
.mold.burnt-attn .tag{background:#f66d5c;border-color:#ffb3a8;color:#fff}
.mold .fillCut{
  position:absolute;left:34%;top:38%;width:34%;height:31%;
  border-radius:52% 48% 52% 48%;border:2.5px solid rgba(255,240,205,.96);
  box-shadow:0 1px 3px rgba(80,40,10,.5),inset 0 2px 5px rgba(0,0,0,.4),inset 0 -1px 2px rgba(255,255,255,.3);
  transform:rotate(-7deg) scale(.4);opacity:0;z-index:2;pointer-events:none;
  transition:opacity .16s,transform .3s cubic-bezier(.34,1.75,.6,1);
  background-size:cover;
}
.mold.filled .fillCut{opacity:1;transform:rotate(-7deg) scale(1)}
.mold.burnt-attn .fillCut{filter:brightness(.55) saturate(.6);border-color:rgba(120,90,60,.85)}
.mold .steam{position:absolute;top:-4px;left:0;right:0;height:20px;pointer-events:none;opacity:0}
.mold.steaming .steam{opacity:1}
.steam i{position:absolute;bottom:0;width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.7);
  animation:steamUp 1.6s ease-in infinite}
.steam i:nth-child(1){left:30%;animation-delay:0s}
.steam i:nth-child(2){left:52%;animation-delay:.5s}
.steam i:nth-child(3){left:70%;animation-delay:1s}
@keyframes steamUp{from{transform:translateY(6px) scale(.6);opacity:.8}to{transform:translateY(-24px) scale(1.8);opacity:0}}
.mold .smoke{position:absolute;top:-6px;left:0;right:0;height:24px;pointer-events:none;display:none}
.mold.smoking .smoke{display:block}
.smoke i{position:absolute;bottom:0;width:10px;height:10px;border-radius:50%;background:rgba(70,64,60,.75);
  animation:steamUp 1.3s ease-in infinite}
.smoke i:nth-child(1){left:34%;animation-delay:0s}
.smoke i:nth-child(2){left:58%;animation-delay:.45s}
.smoke i:nth-child(3){left:46%;animation-delay:.9s}
.mold .prog{
  position:absolute;left:8px;right:8px;bottom:4px;height:6px;border-radius:4px;
  background:rgba(0,0,0,.55);overflow:hidden;opacity:0;transition:opacity .2s;
}
.mold .prog i{display:block;height:100%;width:0%;background:linear-gradient(90deg,#ffd25c,#ff9046);border-radius:4px}
.mold.cooking .prog{opacity:1}
.spark{position:absolute;font-size:16px;color:#fff2b8;pointer-events:none;z-index:4;
  text-shadow:0 0 10px #ffcf6e;animation:sparkle .9s ease-out forwards}
@keyframes sparkle{from{transform:scale(.4) translateY(0);opacity:1}to{transform:scale(1.6) translateY(-24px);opacity:0}}

/* ---------- 하단: 쟁반 + 재료선택 ---------- */
#bottomPanel{
  z-index:5;flex:0 0 auto;
  background:
    linear-gradient(180deg,rgba(255,255,255,.35),transparent 14px),
    repeating-linear-gradient(90deg,#d99b52 0 70px,#cf8f46 70px 72px);
  border-top:5px solid #fff;padding:9px 10px calc(env(safe-area-inset-bottom,0px) + 10px);
  box-shadow:0 -6px 18px rgba(140,80,20,.3);
}

<script>
"use strict";
/* =====================================================
   붕어빵 타이쿤 — 모바일 리메이크 (파스텔 카툰 에디션)
   ===================================================== */

/* ---------- 유틸 ---------- */
const $=s=>document.querySelector(s);
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
const lerp=(a,b,t)=>a+(b-a)*t;
const rnd=(a,b)=>a+Math.random()*(b-a);
const ri=(a,b)=>Math.floor(rnd(a,b+1));
const fmt=n=>"₩ "+Math.round(n).toLocaleString("ko-KR");
const vibrate=ms=>{try{navigator.vibrate&&navigator.vibrate(ms)}catch(e){}};
let uid=0;

function lerpColor(c1,c2,t){
  const p=h=>[parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)];
  const a=p(c1),b=p(c2);
  return "rgb("+Math.round(lerp(a[0],b[0],t))+","+Math.round(lerp(a[1],b[1],t))+","+Math.round(lerp(a[2],b[2],t))+")";
}

/* ---------- 사운드 (WebAudio 신스) ---------- */
let AC=null,muted=false;
function ac(){ if(!AC){ try{AC=new (window.AudioContext||window.webkitAudioContext)()}catch(e){} } if(AC&&AC.state==="suspended")AC.resume(); return AC; }
function tone(freq,dur,type,vol,delay){
  if(muted)return; const ctx=ac(); if(!ctx)return;
  const t0=ctx.currentTime+(delay||0);
  const o=ctx.createOscillator(),g=ctx.createGain();
  o.type=type||"sine"; o.frequency.setValueAtTime(freq,t0);
  g.gain.setValueAtTime(vol||.15,t0);
  g.gain.exponentialRampToValueAtTime(.001,t0+dur);
  o.connect(g).connect(ctx.destination); o.start(t0); o.stop(t0+dur+.02);
}
function noise(dur,vol){
  if(muted)return; const ctx=ac(); if(!ctx)return;
  const len=ctx.sampleRate*dur, buf=ctx.createBuffer(1,len,ctx.sampleRate), d=buf.getChannelData(0);
  for(let i=0;i<len;i++)d[i]=(Math.random()*2-1)*(1-i/len);
  const s=ctx.createBufferSource(),g=ctx.createGain(),f=ctx.createBiquadFilter();
  f.type="highpass"; f.frequency.value=1200;
  g.gain.value=vol||.12; s.buffer=buf; s.connect(f).connect(g).connect(ctx.destination); s.start();
}
/* ---------- 사용자 교체용 사운드 파일 훅 ----------
   assets/ 폴더에 아래 오디오 파일이 있으면 합성음 대신 사용합니다(없으면 기존 합성음).

(function loadSounds(){
  if(typeof Audio==="undefined")return;
  const dir="assets/";
  const ld=(name,key,loop)=>{
    const a=new Audio();
    a.addEventListener("canplaythrough",()=>{ if(loop)a.loop=true; SND[key]=a; },{once:true});

    a.preload="auto"; a.src=dir+name;
  };
  ld("pour.mp3","pour"); ld("flip.mp3","flip"); ld("collect.mp3","collect");
  ld("sell.mp3","sell"); ld("burnt.mp3","burnt"); ld("sizzle.mp3","sizzle",true);

  ld("bgm.mp3","bgm",true);
})();

  const a=SND[key]; if(!a||muted)return false;
  try{ const n=a.cloneNode(); n.volume=a.volume; n.play().catch(()=>{}); }catch(e){}
  return true;
}

/* ---------- 배경음악 (제너레이티브 오르골 로파이) ---------- */
const BGM={on:false,timer:null,next:0,bar:0};
const PROG=[[57,60,64,69],[53,57,60,65],[48,52,55,60],[55,59,62,67]]; // Am - F - C - G
const PENTA=[72,74,76,79,81,84];
function midiF(m){return 440*Math.pow(2,(m-69)/12)}
function noteAt(t,midi,dur,vol,type){
  const ctx=AC; if(!ctx)return;
  const o=ctx.createOscillator(),g=ctx.createGain();
  o.type=type||"sine"; o.frequency.setValueAtTime(midiF(midi),t);
  g.gain.setValueAtTime(0,t);
  g.gain.linearRampToValueAtTime(vol,t+.02);
  g.gain.exponentialRampToValueAtTime(.0008,t+dur);
  o.connect(g).connect(ctx.destination); o.start(t); o.stop(t+dur+.05);
}
function hatAt(t,vol){
  const ctx=AC; if(!ctx)return;
  const len=Math.floor(ctx.sampleRate*.05),buf=ctx.createBuffer(1,len,ctx.sampleRate),d=buf.getChannelData(0);
  for(let i=0;i<len;i++)d[i]=(Math.random()*2-1)*(1-i/len);
  const s=ctx.createBufferSource(),g=ctx.createGain(),f=ctx.createBiquadFilter();
  f.type="highpass";f.frequency.value=8000;g.gain.value=vol;
  s.buffer=buf;s.connect(f).connect(g).connect(ctx.destination);s.start(t);
}
function scheduleBar(t){
  const fever=!!(day&&day.feverOn);
  const beat=60/(fever?118:92), chord=PROG[BGM.bar%PROG.length];
  // 베이스
  noteAt(t,chord[0]-12,beat*1.8,.05,"triangle");
  noteAt(t+beat*2,chord[0]-12,beat*1.8,.045,"triangle");
  // 오르골 아르페지오 (랜덤 쉼표로 매번 다른 패턴)
  const pat=[0,1,2,3,2,1];
  for(let i=0;i<6;i++){
    if(Math.random()<.15)continue;
    noteAt(t+beat*.5*i+beat*.25,chord[pat[i]%chord.length]+12,beat*.9,.028,"sine");
  }
  // 멜로디 (펜타토닉, 드문드문)
  if(Math.random()<(fever?.85:.55)){
    const n=PENTA[Math.floor(Math.random()*PENTA.length)];
    noteAt(t+beat*(2+Math.floor(Math.random()*2)*.5),n,beat*1.4,.05,"sine");
  }
  hatAt(t+beat,.012); hatAt(t+beat*3,.012);
  if(fever){hatAt(t+beat*1.5,.012);hatAt(t+beat*3.5,.012);}
  BGM.bar++;
}
function startBGM(){
  const ctx=ac();
  if(SND.bgm){ // 사용자 배경음악 파일 우선 (생성 음악 대신)
    SND.bgm.volume=0.5;
    if(!muted)SND.bgm.play().catch(()=>{});
    return;
  }
  if(!ctx||BGM.on)return;
  BGM.on=true; BGM.next=ctx.currentTime+.15; BGM.bar=0;
  BGM.timer=setInterval(()=>{
    if(!BGM.on||muted||!AC)return;
    if(BGM.next<AC.currentTime)BGM.next=AC.currentTime+.05;
    const fever=!!(day&&day.feverOn);
    const barLen=4*60/(fever?118:92);
    while(BGM.next<AC.currentTime+.8){ scheduleBar(BGM.next); BGM.next+=barLen; }
  },200);
}

/* ---------- 굽기 지글지글 사운드 ---------- */
let sizz=null;
function ensureSizzle(){
  const ctx=ac(); if(!ctx||sizz)return;
  const len=ctx.sampleRate,buf=ctx.createBuffer(1,len,ctx.sampleRate),d=buf.getChannelData(0);
  for(let i=0;i<len;i++)d[i]=Math.random()*2-1;
  const s=ctx.createBufferSource(),g=ctx.createGain(),f=ctx.createBiquadFilter();
  s.buffer=buf;s.loop=true;
  f.type="bandpass";f.frequency.value=5200;f.Q.value=.8;
  g.gain.value=0;
  s.connect(f).connect(g).connect(ctx.destination);s.start();
  sizz={g};
}
function setSizzle(n){
  // 합성 '치익' 지글지글음은 제거(거슬린다는 피드백). 단, 사용자가 sizzle.mp3를 넣으면 그건 재생.
  if(SND.sizzle){
    const a=SND.sizzle;
    if(muted||n<=0){ if(!a.paused)a.pause(); }
    else{ a.volume=Math.min(.6,n*.14); if(a.paused)a.play().catch(()=>{}); }
  }
}

  setFishColor(m,color);

function titleFor(lv){let t=TITLES[0][1];for(const p of TITLES)if(lv>=p[0])t=p[1];return t}
function xpNeed(lv){return 120+(lv-1)*80}
function addXP(n){
  G.xp+=n;
  while(G.xp>=xpNeed(G.level)){
    G.xp-=xpNeed(G.level); G.level++;
    const reward=G.level*300;
    G.money+=reward;
    levelUpFx(reward);
  }
  updateHUD();
}

  const ov=$("#lvlOverlay");
  ov.querySelector(".lvlNum").textContent="Lv."+(G.level-1)+" → Lv."+G.level;

function addCombo(){
  day.combo++;
  if(day.combo>day.bestCombo)day.bestCombo=day.combo;
  if(day.combo>G.bestCombo)G.bestCombo=day.combo;
  const fx=$("#comboFx");
  if(day.combo>=2){
    fx.querySelector(".cnum").textContent="x"+day.combo;
    fx.classList.remove("hidden"); fx.classList.add("show");
    fx.classList.remove("pop"); void fx.offsetWidth; fx.classList.add("pop");
    SFX.combo(Math.min(day.combo,12));

/* ---------- 눈 내리기 ---------- */
(function snow(){
  const cv=$("#snow"),cx=cv.getContext("2d");
  const DPR=Math.min(devicePixelRatio||1,2);   // 고DPI 기기 부하 상한
  let W,H,flakes=[];
  function resize(){
    W=cv.width=cv.offsetWidth*DPR; H=cv.height=cv.offsetHeight*DPR;
    flakes=Array.from({length:20},()=>({x:Math.random()*W,y:Math.random()*H,r:rnd(1.4,3.4)*DPR,s:rnd(14,34)*DPR,w:rnd(.4,1.6),p:rnd(0,6.28)}));
  }
  resize(); addEventListener("resize",resize);
  let pt=0;
  (function tick(t){
    const dt=Math.min((t-pt)/1000,.05); pt=t;
    // 탭이 백그라운드면 그리기 생략 (부하 절감)
    if(document.hidden){ requestAnimationFrame(tick); return; }
    cx.clearRect(0,0,W,H); cx.fillStyle="rgba(255,255,255,.9)";
    for(const f of flakes){
      f.y+=f.s*dt; f.p+=f.w*dt; f.x+=Math.sin(f.p)*.5*DPR;
      if(f.y>H+6){f.y=-6;f.x=Math.random()*W}
      cx.beginPath(); cx.arc(f.x,f.y,f.r,0,6.283); cx.fill();
    }
    requestAnimationFrame(tick);
  })(0);
})();

function tapMold(m){
  if(!running)return;
  if(m.state==="empty"){
    const f=FILLINGS[selFill];
    if(!G.unlocked[selFill]){toast("아직 잠긴 재료예요");return}
    if(G.money<f.cost){
      const cheapest=Math.min.apply(null,FILL_KEYS.filter(k=>G.unlocked[k]).map(k=>FILLINGS[k].cost));
      if(f.cost<=cheapest){ // 가장 싼 재료는 파산해도 항상 구울 수 있게 비상 지원
        const aid=f.cost-G.money; G.money=f.cost;
        toast("비상 재료비 +"+aid.toLocaleString()+"원 지원 — 이걸로 다시 벌어보세요!");

    }
    G.money-=f.cost; day.cost+=f.cost;

    if(IMG.fish){ m.wrap.innerHTML=fishImgStack(); m.imgRaw=m.wrap.querySelector(".raw"); m.imgGold=m.wrap.querySelector(".gold"); m.imgBurnt=m.wrap.querySelector(".burnt"); }

    m.tag.textContent="속 넣기!";
    SFX.pour(); vibrate(12);
    floatText(m.el,"-"+f.cost,true);
    updateHUD();
  }
  else if(m.state==="cookA"&&!m.filled){
    fillMold(m);
  }
  else if(m.state==="fillWait"){
    fillMold(m);
    m.state="flipWait"; m.t=1.4;
    m.tag.textContent="뒤집기!";
  }
  else if(m.state==="flipWait"){
    const perfect=m.t<=1.3;

    m.el.classList.remove("attn"); m.el.classList.add("flipping","cooking");
    setTimeout(()=>m.el.classList.remove("flipping"),340);

  }
  else if(m.state==="done"){
    const perfect=m.t<=1.5;
    day.tray[m.fill]=(day.tray[m.fill]||0)+1;
    m.el.classList.remove("attn");

    if(perfect)perfectFx(m); else addFever(2);
    m.state="empty"; renderMoldEmpty(m);
    renderTray(m.fill);
  }
  else if(m.state==="burnt"){
    m.state="empty"; renderMoldEmpty(m);
    toast("탄 붕어빵을 버렸어요…");
    SFX.burnt(); vibrate([20,40,20]);
  }
}

/* ---------- 틀 조작: 탭 vs 드래그(서비스) ---------- */
function attachMold(m){
  m.el.addEventListener("pointerdown",e=>{
    e.preventDefault();
    if(!running)return;
    const sx=e.clientX, sy=e.clientY;
    const canDrag=(m.state==="done"||m.state==="burnt");
    let dragging=false, ghost=null;
    const move=ev=>{
      const dx=ev.clientX-sx, dy=ev.clientY-sy;
      if(!dragging){
        if(canDrag && Math.abs(dx)+Math.abs(dy)>12){
          dragging=true;
          m.el.classList.add("grabbing");
          ghost=makeGhost(m);
          document.querySelectorAll(".customer").forEach(c=>{if(!c.classList.contains("leave"))c.classList.add("drop-hint")});
        } else return;
      }
      ghost.style.left=ev.clientX+"px"; ghost.style.top=ev.clientY+"px";
      const hit=customerAt(ev.clientX,ev.clientY);
      document.querySelectorAll(".customer.drop-on").forEach(c=>c.classList.remove("drop-on"));
      if(hit)hit.el.classList.add("drop-on");
    };
    const up=ev=>{
      document.removeEventListener("pointermove",move);
      document.removeEventListener("pointerup",up);
      m.el.classList.remove("grabbing");
      document.querySelectorAll(".customer").forEach(c=>c.classList.remove("drop-hint","drop-on"));
      if(ghost)ghost.remove();
      if(dragging){
        const c=customerAt(ev.clientX,ev.clientY);
        if(c)serviceCustomer(m,c); else discardMold(m);
      }else{
        tapMold(m);
      }
    };
    document.addEventListener("pointermove",move,{passive:false});
    document.addEventListener("pointerup",up);
  });
}
function makeGhost(m){
  const g=document.createElement("div"); g.className="dragGhost";
  if(IMG.fish){
    const src=m.state==="burnt"?IMG.fishBurnt:(IMG.fillFish[m.fill]||IMG.fishGold);
    g.innerHTML='<img src="'+src+'" alt="">';
  }else{
    g.innerHTML=miniFish(m.state==="burnt"?"#3a2a1e":(FILLINGS[m.fill]?FILLINGS[m.fill].color:"#e8a53f"));
  }
  $("#app").appendChild(g);
  return g;
}
function customerAt(x,y){
  let el=document.elementFromPoint(x,y);
  while(el&&!(el.classList&&el.classList.contains("customer")))el=el.parentElement;
  if(!el)return null;
  return customers.find(c=>c.el===el&&!c.leaving)||null;
}
function serviceCustomer(m,c){
  if(m.state==="done"){
    // 잘 익은 붕어빵 서비스 → 팁
    let tip=Math.round((120+G.upg.pack*80+(G.rep-3)*40)*(day.feverOn?2:1)/10)*10;
    tip=Math.max(60,tip);
    G.money+=tip; day.tips+=tip; day.service=(day.service||0)+1;
    G.rep=clamp(G.rep+0.05,1,5);
    addCombo(); addFever(8); addXP(6);
    floatText(c.el,"서비스! 팁 +"+tip,false);
    c.el.classList.add("happyPop");
    const mo=c.el.querySelector(".mouth"); if(mo)mo.setAttribute("d",MOUTH_HAPPY);
    SFX.sell(); vibrate(16); checkGoal(); checkAch();
  }else if(m.state==="burnt"){
    // 탄 붕어빵 서비스 → 평판 소폭 회복 (팁 없음)
    G.rep=clamp(G.rep+0.03,1,5); day.service=(day.service||0)+1;
    floatText(c.el,"서비스 ♡",false);
    toast("탄 붕어빵을 서비스로 드렸어요");
    SFX.collect(); vibrate(10);
  }else return;
  m.state="empty"; renderMoldEmpty(m); updateHUD();
}
function discardMold(m){
  if(m.state==="burnt"){ toast("탄 붕어빵을 버렸어요…"); SFX.burnt(); vibrate([20,40,20]); }
  else{ toast("붕어빵을 버렸어요"); SFX.plop(); }
  m.state="empty"; renderMoldEmpty(m);
}

function updateMold(m,dt){
  if(m.state==="empty")return;
  m.t+=dt;
  if(m.state==="cookA"){
    const p=clamp(m.t/cookA(),0,1);
    paintFish(m,lerpColor(COL_RAW,COL_GOLD,p*.55),p*.55,0);
    setBar(m,p*50);
    if(p>=1){
      if(m.filled){ m.state="flipWait"; m.t=0; m.el.classList.add("attn"); m.tag.textContent="뒤집기!"; SFX.tick(); }
      else{ m.state="fillWait"; m.t=0; m.el.classList.remove("fill-attn"); m.el.classList.add("attn"); m.tag.textContent="속 넣기!"; SFX.tick(); }
    }
  }
  else if(m.state==="fillWait"){
    const p=clamp(m.t/graceFlip(),0,1);
    paintFish(m,lerpColor(COL_GOLD,COL_DARK,p*.7),1,p*.3);
    if(p>=1)burn(m);
  }
  else if(m.state==="flipWait"){
    const p=clamp(m.t/graceFlip(),0,1);
    paintFish(m,lerpColor(COL_GOLD,COL_DARK,p*.7),1,p*.3);
    if(p>=1)burn(m);
  }
  else if(m.state==="cookB"){
    const p=clamp(m.t/cookB(),0,1);
    paintFish(m,lerpColor(COL_RAW,COL_GOLD,.45+p*.55),.45+p*.55,0);
    setBar(m,50+p*50);
    if(p>=1){ m.state="done"; m.t=0; m.el.classList.add("attn"); m.tag.textContent="완성!"; sparkAt(m.el); SFX.bell(); }
  }
  else if(m.state==="done"){
    const p=clamp(m.t/graceDone(),0,1);
    paintFish(m,lerpColor(COL_GOLD,COL_BURNT,p),1,p);
    if(p>=1)burn(m);
  }
}
function burn(m){
  m.state="burnt";
  paintFish(m,COL_BURNT,1,1);
  m.el.classList.remove("attn","cooking","steaming","fill-attn");
  m.el.classList.add("smoking","burnt-attn");
  m.tag.textContent="탔어요!";
  day.burnt++;
  resetCombo();
  SFX.burnt(); vibrate(60);
}
function sparkAt(el){
  for(let i=0;i<3;i++){
    const s=document.createElement("div");
    s.className="spark"; s.textContent="✦";
    s.style.left=(20+Math.random()*60)+"%";
    s.style.top=(10+Math.random()*40)+"%";
    el.appendChild(s);
    setTimeout(()=>s.remove(),950);
  }
}

function trayFish(){ return IMG.fish ? '<img src="'+IMG.fishGold+'" alt="">' : miniFish("#e8a53f"); }
function labelTextColor(hex){ const p=h=>parseInt(hex.slice(h,h+2),16); const lum=0.299*p(1)+0.587*p(3)+0.114*p(5); return lum>150?"#5a3a22":"#fff"; }
function renderTray(bumpKey){

/* ---------- 손님 성격 ---------- */
const PERSONA={
  normal:{name:"",pat:1,pay:1},
  busy:{name:"바빠요!",color:"#f66d5c",pat:.55,pay:1.1},
  chill:{name:"느긋함",color:"#6dc46b",pat:1.6,pay:1},
  big:{name:"대식가",color:"#e8933d",pat:1.15,pay:1},
  vip:{name:"VIP",color:"#a97ad9",pat:.7,pay:1.6},
  thug:{name:"진상!",color:"#8a5a3a",pat:.6,pay:0.6},   // 저지불 + 주변 인내심 깎는 방해 손님
};
function pickPersona(){
  const d=G.day;
  // 초반엔 까다로운 손님(바빠요/VIP·진상)을 줄이고 느긋한 손님을 늘림
  const busy = d<3?6:(d<6?12:16);
  const vip  = d<2?2:(d<5?5:8);
  const big  = d<2?6:10;
  const thug = d<4?0:(d<8?5:9);        // 진상은 4일차부터, 점점 자주
  const chill= d<3?22:14;
  let r=Math.random()*100;
  for(const q of [["busy",busy],["chill",chill],["big",big],["vip",vip],["thug",thug]]){ if((r-=q[1])<=0)return q[0]; }
  return "normal";
}

/* ---------- 손님 ---------- */
function effDay(){ return Math.min(G.day,12); }   // 난이도 상한 — 12일차 이후 더 안 어려워짐
function maxQueue(){ return (G.day<3?2:3)+((day&&day.rushT>0)?1:0); }   // 최대 4명
function patienceTime(){ return Math.max(18, 36-(effDay()-1)*1.4)+G.upg.word*3; }   // 초반 넉넉 → 점점 짧게(상한)
function spawnInterval(){
  const base=Math.max(2.8, 9.5-G.upg.word*0.7-(effDay()-1)*0.5);   // 초반 느긋 → 점점 빠르게(하한 상향)
  return rnd(base*.8,base*1.2);
}
function makeOrder(big){
  const unlockedKeys=FILL_KEYS.filter(k=>G.unlocked[k]);
  const maxItems=clamp(1+Math.floor(effDay()/3),1,3)+ (Math.random()<.25?1:0);
  let total=ri(1,clamp(maxItems,1,4));
  if(big)total=clamp(total+1,2,4);
  const order={};
  for(let i=0;i<total;i++){
    const k=unlockedKeys[ri(0,unlockedKeys.length-1)];
    order[k]=(order[k]||0)+1;
  }
  return order;
}
function startRush(){
  day.rushDone=true; day.rushT=12;
  $("#gameScreen").classList.add("rush");
  toast("🏃 러시아워! 손님이 몰려옵니다! (대기열 +1, 방문 급증)",3400);
  SFX.bell(); vibrate([30,40,30,40,60]);
  day.spawnT=Math.min(day.spawnT,0.5);   // 곧바로 몰리기 시작
}
function spawnCustomer(){
  if(customers.length>=maxQueue())return;
  const pk=pickPersona(), pers=PERSONA[pk];
  const c={
    pers, persId:pk,
    order:makeOrder(pk==="big"), t:0, max:patienceTime()*pers.pat,
    el:document.createElement("div"), leaving:false,
  };
  c.remaining={...c.order};
  c.el.className="customer enter";
  const charArt=IMG.customers.length
    ?'<img class="body" src="'+IMG.customers[ri(0,IMG.customers.length-1)]+'" alt="">'
    :customerSVG();
  const persTag=pers.name?'<div class="pers" style="background:'+pers.color+'">'+pers.name+'</div>':'';
  c.el.innerHTML='<div class="bubble">'+persTag+'<div class="orders"></div><div class="patience"><i></i></div></div>'+charArt;
  c.bubbleOrders=c.el.querySelector(".orders");
  c.pbar=c.el.querySelector(".patience i");
  renderOrder(c);
  c.el.addEventListener("pointerdown",e=>{e.preventDefault();serveCustomer(c)});
  $("#street").appendChild(c.el);
  customers.push(c);
  SFX.arrive();
  if(pk==="thug"){ toast("😤 진상 손님 등장! 주변 손님이 조급해해요",3000); SFX.angry(); }
  else if(pk==="vip"){ toast("⭐ VIP 손님! 잘 대접하면 큰 팁!",2600); }
  setTimeout(()=>c.el.classList.remove("enter"),520);
}
/* 손님 대사 */
const CUST_LINES={
  happy:{
    normal:["잘 먹을게요!","맛있겠다~","고마워요, 또 올게요!","붕어빵 최고!","따끈따끈 좋아요~","완전 맛있어 보여요!"],
    busy:["빨리 줘서 고마워요!","덕분에 안 늦겠다!"],
    chill:["느긋하게 잘 먹을게요~","향이 참 좋네요"],
    big:["잘 먹겠습니다! 냠냠","한 봉지 든든하네요~"],
    vip:["역시 이 집이야!","소문 좀 내야겠어요","최고의 붕어빵!"],
    thug:["흥, 봐줄 만하네","이 정도면 됐어","다음엔 더 빨리 줘"],
  },
  angry:["너무 오래 걸려요!","에잇, 그냥 갈래!","다신 안 와!","불친절하네요…"],
};
function custLine(pid,happy){
  if(!happy){ const a=CUST_LINES.angry; return a[ri(0,a.length-1)]; }
  const a=CUST_LINES.happy[pid]||CUST_LINES.happy.normal; return a[ri(0,a.length-1)];
}
function sayLine(c,happy){
  if(!c.bubbleOrders)return;
  c.bubbleOrders.innerHTML='<div class="say'+(happy?'':' bad')+'">'+custLine(c.persId,happy)+'</div>';
  const pb=c.el.querySelector(".patience"); if(pb)pb.style.display="none";
}
function renderOrder(c){
  let html="";
  for(const k in c.order){
    const left=c.remaining[k]||0, tot=c.order[k];
    const cls=left===0?"order-line done-part":"order-line";
    html+='<div class="'+cls+'">'+fishIcon(k)+'<span class="nmlabel">'+FILLINGS[k].name+'</span><b class="cnt">×'+(left>0?left:tot)+'</b></div>';
  }
  c.bubbleOrders.innerHTML=html;
}
function serveCustomer(c){
  if(!running||c.leaving)return;
  let servedAny=false, revenue=0, servedCount=0;
  for(const k in c.remaining){
    const want=c.remaining[k], have=day.tray[k]||0;
    if(want>0&&have>0){
      const n=Math.min(want,have);
      day.tray[k]-=n; c.remaining[k]-=n;
      revenue+=Math.round(FILLINGS[k].price*c.pers.pay)*n; servedCount+=n; servedAny=true;
    }
  }
  if(!servedAny){
    toast("주문한 붕어빵이 쟁반에 없어요");
    return;
  }
  revenue=Math.round(revenue*comboMult()*(day.feverOn?2:1)/10)*10;
  G.money+=revenue; day.revenue+=revenue; day.served+=servedCount;
  G.totalServed+=servedCount; G.totalEarned+=revenue;
  addXP(servedCount*8);
  checkGoal(); checkAch();
  renderTray(); renderOrder(c); updateHUD();
  SFX.sell(); vibrate(18);
  floatText(c.el,"+"+revenue.toLocaleString(),false);

  const left=Object.values(c.remaining).reduce((a,b)=>a+b,0);
  if(left===0){
    // 팁 계산
    const ratio=1-c.t/c.max;
    let tip=0;
    let tipChance=0.35+G.upg.pack*0.15+(ratio>.5?.2:0)+(c.persId==="vip"?.3:0);
    if(c.persId==="busy"&&ratio>.5)tipChance=1;
    if(Math.random()<tipChance){
      tip=Math.round((100+G.upg.pack*80+(G.rep-3)*60)*(ratio>.5?1.5:1)/10)*10;
      tip=Math.max(tip,50);
      G.money+=tip; day.tips+=tip;
      setTimeout(()=>floatText(c.el,"팁 +"+tip,false),350);
    }
    G.rep=clamp(G.rep+0.06,1,5);
    day.happy++;
    addCombo(); addFever(10); addXP(15);
    if(ratio>.6){ addCombo(); setTimeout(()=>floatText(c.el,"빠른 서빙! +콤보",false),200); }
    if(c.persId==="vip"){ G.vipServed=(G.vipServed||0)+1; G.rep=clamp(G.rep+0.1,1,5); addFever(20); sparkAt(c.el); }
    checkGoal();
    c.el.classList.add("happyPop");
    const mouth=c.el.querySelector(".mouth");
    if(mouth)mouth.setAttribute("d",MOUTH_HAPPY);
    sayLine(c,true);
    leaveCustomer(c,true);
  }
}
function leaveCustomer(c,happy){
  c.leaving=true;
  if(!happy){
    G.rep=clamp(G.rep-0.15,1,5);
    day.lost++;
    const mouth=c.el.querySelector(".mouth");
    if(mouth)mouth.setAttribute("d",MOUTH_SAD);
    sayLine(c,false);
    resetCombo();
    SFX.angry();
    if(G.rep<=1.0){ updateHUD(); customers=customers.filter(x=>x!==c); c.el.classList.add("leave"); gameOver(); return; }
    else if(G.rep<1.6&&!day.repWarned){ day.repWarned=true; toast("⚠️ 평판이 위험해요! 별점 1.0이 되면 폐업합니다",3400); }
  }
  updateHUD();
  setTimeout(()=>{
    c.el.classList.add("leave");
    setTimeout(()=>{c.el.remove()},400);
  },happy?950:850);   // 대사 읽을 시간 확보
  customers=customers.filter(x=>x!==c);
}
function gameOver(){
  running=false; endFever(); setSizzle(0);
  customers.forEach(x=>{x.el.classList.add("leave");});
  SFX.burnt(); vibrate([80,60,80,60,120]);
  showModal(
    '<h2>폐업…</h2><div class="msub">평판이 바닥나 가게 문을 닫게 됐어요 😢</div>'+
    '<table class="summary-table">'+
    '<tr><td>버틴 일수</td><td>'+G.day+'일차</td></tr>'+
    '<tr><td>누적 판매</td><td>'+G.totalServed+'개</td></tr>'+
    '<tr><td>누적 수익</td><td>'+fmt(G.totalEarned)+'</td></tr>'+
    '<tr class="total"><td>최종 레벨</td><td>Lv.'+G.level+' '+titleFor(G.level)+'</td></tr>'+
    '</table>'+
    '<div class="msub" style="margin:6px 0 10px">손님을 너무 많이 놓치지 않도록, 러시아워·진상 손님 때 우선순위를 잘 잡아보세요!</div>'+
    '<div class="modal-btns"><button class="btn" id="btnRetry">처음부터 다시</button></div>'
  );
  $("#btnRetry").addEventListener("pointerdown",e=>{
    e.preventDefault(); hideModal();
    G=newGame(); save(); selFill="red"; startDay();
  });
}
function updateCustomers(dt){
  // 진상 손님이 있으면 주변(다른) 손님의 인내심이 더 빨리 닳음
  const thugPresent=customers.some(c=>c.persId==="thug"&&!c.leaving);
  for(const c of [...customers]){
    if(c.leaving)continue;
    c.t+=dt;
    if(thugPresent&&c.persId!=="thug")c.t+=dt*0.5;   // 방해 오라 +50% 소모
    const r=clamp(1-c.t/c.max,0,1);
    const pct=Math.round(r*100);
    if(c.ppct!==pct){ c.ppct=pct; c.pbar.style.width=pct+"%"; }
    const band=r>.5?0:(r>.25?1:2);
    if(c.pband!==band){ c.pband=band; c.pbar.style.background=band===0?"var(--ok)":(band===1?"#f5a83c":"var(--bad)"); }
    if(c.t>=c.max)leaveCustomer(c,false);
  }
}

/* ---------- 하루 진행 ---------- */
function startDay(){
  // 파산/과소비 방지 — 붕어틀을 한 판 채울 최소 운영 자금은 보장
  const moldCount=MOLD_COUNTS[G.upg.molds]||MOLD_COUNTS[0];
  const minReserve=FILLINGS.red.cost*moldCount;
  if(G.money<minReserve){
    const aid=minReserve-G.money;
    G.money=minReserve;
    toast("운영 자금이 부족해 비상 지원금 +"+aid.toLocaleString()+"원을 받았어요");
    save();
  }
  day={time:0,revenue:0,cost:0,tips:0,served:0,lost:0,happy:0,burnt:0,service:0,
    tray:{},spawnT:1.2,closing:false,
    rushT:0, rushDone:(G.day<2), rushAt:rnd(DAY_LENGTH*0.35,DAY_LENGTH*0.6),  // 2일차부터 러시아워 1회
    goal:dayGoal(),goalHit:false,combo:0,bestCombo:0,fever:0,feverOn:false,feverT:0};
  $("#gameScreen").classList.remove("rush");
  customers.forEach(c=>c.el.remove()); customers=[];
  buildGrill(); renderTray(); renderFillingBar(); updateHUD();
  $("#comboFx").classList.add("hidden"); endFever();
  $("#dayBar").style.width="0%";
  running=true; lastT=performance.now();
  toast(G.day+"일차 장사 시작! — "+titleFor(G.level));
  requestAnimationFrame(loop);
  if(!G.hintService){ G.hintService=1; save();
    setTimeout(()=>{ if(running)toast("완성·탄 붕어빵을 손님에게 끌어다 놓으면 '서비스' 🎁"); },5000); }
}
function loop(t){
  if(!running)return;
  if(paused){ lastT=t; requestAnimationFrame(loop); return; }
  const dt=Math.min((t-lastT)/1000,.06); lastT=t;
  day.time+=dt;
  if(day.feverOn){
    day.feverT-=dt; day.fever=clamp(day.feverT/10*100,0,100); renderFever();
    if(day.feverT<=0)endFever();
  }else if(day.fever>0){
    day.fever=Math.max(0,day.fever-dt*1.2); renderFever();
  }
  const dayRatio=clamp(day.time/DAY_LENGTH,0,1);
  $("#dayBar").style.width=(dayRatio*100)+"%";

  // 러시아워 이벤트
  if(!day.rushDone && !day.closing && day.time>=day.rushAt) startRush();
  if(day.rushT>0){ day.rushT-=dt; if(day.rushT<=0){ day.rushT=0; $("#gameScreen").classList.remove("rush"); toast("러시아워 종료 — 한숨 돌리세요"); } }

  if(!day.closing){
    day.spawnT-=dt;
    if(day.spawnT<=0){ spawnCustomer(); day.spawnT=spawnInterval()*(day.feverOn?.5:1)*(day.rushT>0?.5:1); }
    if(day.time>=DAY_LENGTH){ day.closing=true; toast("영업 마감! 남은 손님까지만 받아요"); }
  }
  for(const m of molds)updateMold(m,dt);
  if(SND.sizzle)setSizzle(molds.reduce((a,m)=>a+((m.state==="cookA"||m.state==="cookB")?1:0),0));
  updateCustomers(dt);

  if(day.closing&&customers.length===0){
    const cookingLeft=molds.some(m=>m.state!=="empty"&&m.state!=="burnt");
    if(!cookingLeft){ endDay(); return; }
  }
  requestAnimationFrame(loop);
}
function endDay(){
  running=false;
  endFever();
  setSizzle(0);
  const profit=day.revenue+day.tips-day.cost;
  const isRecord=profit>G.bestProfit&&profit>0;
  if(isRecord)G.bestProfit=profit;
  addXP(20);
  checkAch();
  showModal(
    '<h2>'+G.day+'일차 마감</h2><div class="msub">오늘 하루도 수고했어요!</div>'+
    '<table class="summary-table">'+
    '<tr><td>판매 수익</td><td>'+fmt(day.revenue)+'</td></tr>'+
    '<tr><td>팁</td><td>'+fmt(day.tips)+'</td></tr>'+
    '<tr><td>재료비</td><td style="color:#e0564a">-'+fmt(day.cost).slice(2)+'원</td></tr>'+
    '<tr class="total"><td>순이익</td><td>'+(profit>=0?"+":"")+fmt(profit)+(isRecord?' <span style="color:#4db06b">신기록!</span>':'')+'</td></tr>'+
    '</table>'+
    '<table class="summary-table">'+
    '<tr><td>판매한 붕어빵</td><td>'+day.served+'개</td></tr>'+
    '<tr><td>행복한 손님</td><td>'+day.happy+'명</td></tr>'+
    '<tr><td>서비스 제공</td><td>'+(day.service||0)+'개</td></tr>'+
    '<tr><td>놓친 손님</td><td>'+day.lost+'명</td></tr>'+
    '<tr><td>태운 붕어빵</td><td>'+day.burnt+'개</td></tr>'+
    '<tr><td>최고 콤보</td><td>x'+day.bestCombo+'</td></tr>'+
    '</table>'+
    '<div class="modal-btns"><button class="btn" id="btnShop">상점 가기</button></div>'
  );
  $("#btnShop").addEventListener("pointerdown",e=>{e.preventDefault();openShop()});
  G.day++;
  save();
}

/* ---------- 상점 ---------- */
function openShop(){
  let html='<h2>업그레이드 상점</h2><div class="msub">내일 장사를 준비하세요</div>'+
    '<div id="shopMoney">'+fmt(G.money)+'</div>';

  // 업그레이드
  for(const key in UPGRADES){
    const u=UPGRADES[key],lv=G.upg[key],max=u.costs.length;
    const maxed=lv>=max;
    const cost=maxed?0:u.costs[lv];
    let dots="";
    for(let i=0;i<max;i++)dots+='<i class="'+(i<lv?"on":"")+'"></i>';
    html+='<div class="shop-item"><div class="info">'+
      '<div class="nm">'+u.name+'</div><div class="ds">'+u.desc+'</div>'+
      '<div class="lv">'+dots+'</div></div>'+
      (maxed
        ?'<button class="buy maxed" disabled>최대</button>'
        :'<button class="buy" data-upg="'+key+'" '+(G.money<cost?"disabled":"")+'>'+cost.toLocaleString()+'원</button>')+
      '</div>';
  }
  // 재료 해금
  for(const k of FILL_KEYS){
    const f=FILLINGS[k];
    if(f.unlockAt===0)continue;
    const owned=G.unlocked[k];
    html+='<div class="shop-item"><div class="info">'+
      '<div class="nm">'+f.name+' 붕어빵</div><div class="ds">판매가 '+f.price.toLocaleString()+'원 · 재료비 '+f.cost.toLocaleString()+'원</div></div>'+
      (owned
        ?'<button class="buy maxed" disabled>보유중</button>'
        :'<button class="buy" data-fill="'+k+'" '+(G.money<f.unlockAt?"disabled":"")+'>'+f.unlockAt.toLocaleString()+'원</button>')+
      '</div>';
  }
  html+='<div class="modal-btns"><button class="btn" id="btnNextDay">'+G.day+'일차 시작</button></div>';
  showModal(html);

  document.querySelectorAll("[data-upg]").forEach(b=>{
    b.addEventListener("pointerdown",e=>{
      e.preventDefault();
      const key=b.dataset.upg,u=UPGRADES[key],cost=u.costs[G.upg[key]];
      if(G.money<cost)return;
      G.money-=cost; G.upg[key]++;
      SFX.buy(); vibrate(15); save(); openShop();
    });
  });
  document.querySelectorAll("[data-fill]").forEach(b=>{
    b.addEventListener("pointerdown",e=>{
      e.preventDefault();
      const k=b.dataset.fill,f=FILLINGS[k];
      if(G.money<f.unlockAt)return;
      G.money-=f.unlockAt; G.unlocked[k]=true;
      SFX.buy(); vibrate(15); save(); openShop();
    });
  });
  $("#btnNextDay").addEventListener("pointerdown",e=>{
    e.preventDefault(); hideModal(); save(); startDay();
  });
}

/* ---------- 모달 ---------- */
function showModal(html){ $("#modalCard").innerHTML=html; $("#modalOverlay").classList.remove("hidden"); }
function hideModal(){ $("#modalOverlay").classList.add("hidden"); }

/* ---------- 인트로 / 튜토리얼 ---------- */
const INTRO_SLIDES=[
  { cls:"", badge:"① 굽는 재미",
    head:"굽고, 뒤집고,<br>제때 착!",
    body:"반죽을 붓고 <b>팥을 채워</b> 노릇하게 굽는 한 판이 곧 <b>퍼즐</b>이에요. 손님이 몰릴수록 붕어빵 타는 속도도 빨라지니, <b>빠른 손놀림</b>으로 타이밍을 맞춰보세요!",
    art:()=>'<div class="intro-stage">'+
        '<div style="background:linear-gradient(180deg,#4d5570,#262b3c);border-radius:20px;padding:16px 22px;box-shadow:inset 0 3px 8px rgba(255,255,255,.14),inset 0 -8px 14px rgba(0,0,0,.5),0 10px 22px rgba(90,50,10,.35);border:4px solid #fff">'+
          fishSVG(COL_GOLD,"intro-fish-fry")+'</div>'+
        '<svg class="intro-timer-ring" viewBox="0 0 52 52"><circle class="bg" cx="26" cy="26" r="22"/><circle class="fg" cx="26" cy="26" r="22"/></svg>'+
        '<div class="intro-hand">👆</div>'+
      '</div>' },
  { cls:"green", badge:"② 성장하는 재미",
    head:"작은 포장마차에서<br>거리의 명소로!",
    body:"번 돈으로 <b>붕어틀을 늘리고</b> 화력·포장·펫까지 업그레이드하면 매출이 쭉쭉 오릅니다. 내 손으로 <b>우상향</b>하는 가게를 보는 뿌듯함이 있어요.",
    art:()=>'<div class="intro-stage">'+
        '<div class="intro-chart"><i></i><i></i><i></i><i></i><i></i></div>'+
        '<div class="intro-arrow">📈</div>'+
      '</div>' },
  { cls:"blue", badge:"③ 콤보 & 변수 대처",
    head:"콤보로 대박,<br>변수는 침착하게!",
    body:"손님 성격에 맞춰 <b>제때 내놓으면 콤보</b>가 터져 수익이 쑥! 타거나 덜 익은 붕어빵, 러시아워 같은 <b>돌발 변수</b>를 빠르게 처리하며 지루할 틈 없이 즐겨보세요.",
    art:()=>'<div class="intro-stage">'+
        '<div class="intro-combo">x5 콤보!</div>'+
        miniW("intro-mini m1","#b8465a")+miniW("intro-mini m2","#f7d264")+miniW("intro-mini m3","#6b4326")+
      '</div>' },
];
function miniW(cls,color){ return '<div class="'+cls+'">'+miniFish(color)+'</div>'; }
let introIdx=0;
function introImages(){ const a=[]; for(let i=1;IMG.intro[i];i++)a.push(IMG.intro[i]); return a; }
function introCount(){ const n=introImages().length; return n>0?n:INTRO_SLIDES.length; }
function buildIntro(){
  const track=$("#introTrack"); track.innerHTML="";
  const dots=$("#introDots"); dots.innerHTML="";
  const imgs=introImages();
  if(imgs.length){
    // 사용자가 넣은 인트로 이미지 사용
    imgs.forEach(src=>{
      const el=document.createElement("div");
      el.className="intro-slide img";
      el.innerHTML='<img class="intro-img" src="'+src+'" alt="">';
      track.appendChild(el);
      dots.appendChild(document.createElement("i"));
    });
  }else{
    INTRO_SLIDES.forEach(s=>{
      const el=document.createElement("div");
      el.className="intro-slide "+s.cls;
      el.innerHTML=s.art()+'<div class="intro-badge">'+s.badge+'</div>'+
        '<div class="intro-h">'+s.head+'</div><div class="intro-p">'+s.body+'</div>';
      track.appendChild(el);
      dots.appendChild(document.createElement("i"));
    });
  }
}
function showIntroSlide(i){
  introIdx=clamp(i,0,introCount()-1);
  $("#introTrack").style.transform="translateX("+(-introIdx*100)+"%)";
  $("#introDots").querySelectorAll("i").forEach((d,k)=>d.classList.toggle("on",k===introIdx));
  $("#introPrev").style.visibility=introIdx===0?"hidden":"visible";
  $("#introNext").textContent=introIdx===introCount()-1?"장사 시작! 🐟":"다음";
  SFX.plop();
}
function startIntro(){
  buildIntro();
  $("#titleScreen").classList.add("hidden");
  $("#introScreen").classList.remove("hidden");
  showIntroSlide(0);
}
function finishIntro(){
  $("#introScreen").classList.add("hidden");
  enterGame();
}
function initIntro(){
  $("#introNext").addEventListener("pointerdown",e=>{e.preventDefault();ac();
    if(introIdx>=INTRO_SLIDES.length-1)finishIntro(); else showIntroSlide(introIdx+1);});
  $("#introPrev").addEventListener("pointerdown",e=>{e.preventDefault();
    showIntroSlide(introIdx-1);});
  $("#introSkip").addEventListener("pointerdown",e=>{e.preventDefault();ac();finishIntro();});
  // 스와이프
  let sx=0,sw=false;
  const vp=$("#introViewport");
  vp.addEventListener("pointerdown",e=>{sx=e.clientX;sw=true;});
  vp.addEventListener("pointerup",e=>{if(!sw)return;sw=false;const dx=e.clientX-sx;
    if(dx<-45)showIntroSlide(introIdx+1); else if(dx>45)showIntroSlide(introIdx-1);});
}

/* ---------- 시작 흐름 ---------- */
function enterGame(){
  $("#titleScreen").classList.add("hidden");
  $("#gameScreen").classList.remove("hidden");
  selFill="red";
  startBGM();
  startDay();
}
function init(){
  // 배경 & 타이틀 아트
  const city=document.createElement("div");
  city.className="city"; city.innerHTML=citySVG();
  $("#street").appendChild(city);
  $("#titleCity").innerHTML=citySVG();
  $("#titleFish").innerHTML=fishSVG(COL_GOLD);
  let crowd="";
  for(let i=0;i<5;i++)crowd+=customerSVG();
  $("#titleCrowd").innerHTML=crowd;

  const saved=load();
  if(saved&&saved.day>1)$("#btnContinue").classList.remove("hidden");

  $("#btnNew").addEventListener("pointerdown",e=>{
    e.preventDefault(); ac();
    G=newGame(); save(); startIntro();
  });
  initIntro();
  $("#btnContinue").addEventListener("pointerdown",e=>{
    e.preventDefault(); ac();
    G=Object.assign(newGame(),load()||{});
    G.ach=G.ach||{}; G.history=G.history||[];
    enterGame();
  });
  $("#btnAch").addEventListener("pointerdown",e=>{
    e.preventDefault(); openAch();
  });
  $("#btnMute").addEventListener("pointerdown",e=>{
    e.preventDefault();
    muted=!muted;
    $("#btnMute").textContent=muted?"×":"♪";
    setSizzle(0);
    if(SND.bgm){ if(muted)SND.bgm.pause(); else SND.bgm.play().catch(()=>{}); }
    if(!muted)SFX.tick();
  });
  // iOS 오디오 언락
  document.body.addEventListener("pointerdown",()=>ac(),{once:true});
}
init();
</script>
